  <rect x="184" y="256" width="96" height="8" rx="4" fill="#94A3B8"/>
  <rect x="184" y="284" width="144" height="8" rx="4" fill="#94A3B8"/>
  <rect x="184" y="304" width="132" height="8" rx="4" fill="#94A3B8"/>
  <rect x="184" y="332" width="80" height="12" rx="6" fill="#2563EB" opacity="0.5"/>

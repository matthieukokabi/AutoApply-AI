name: Web CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/web/**"
      - ".github/workflows/web-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - ".github/workflows/web-ci.yml"

permissions:
  contents: read

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=moderate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Performance budget gate
        env:
          LIGHTHOUSE_REQUIRED_SUCCESSES: "1"
          LIGHTHOUSE_MAX_ATTEMPTS_PER_RUN: "2"
          LIGHTHOUSE_WARMUP_REQUESTS: "1"
          PERF_BUDGET_EMERGENCY_BYPASS: ${{ vars.PERF_BUDGET_EMERGENCY_BYPASS }}
        run: |
          ./node_modules/.bin/next start --hostname 127.0.0.1 --port 4100 >/tmp/next-start.log 2>&1 &
          SERVER_PID=$!
          cleanup() {
            kill "$SERVER_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for i in {1..60}; do
            if curl -sS http://127.0.0.1:4100/en >/dev/null; then
              break
            fi
            sleep 1
          done
          PERF_BASE_URL=http://127.0.0.1:4100 npm run perf:routes:audit

      - name: Conversion regression sentinel
        env:
          CONVERSION_SENTINEL_EMERGENCY_BYPASS: ${{ vars.CONVERSION_SENTINEL_EMERGENCY_BYPASS }}
        run: npm run telemetry:conversion:sentinel
